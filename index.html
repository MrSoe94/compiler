    <script>
        // Global variables
        let editor;
        let currentLanguage = 'javascript';
        let currentFontSize = 14;

        // Default versions
        let phpRuntimeVersion = '8.2.3';

        // Code Templates
        const templates = {
            javascript: {
                hello: `// Program Hello World Sederhana di JavaScript (Client Sandbox)\nconsole.log("Halo Dunia! Selamat belajar JavaScript.");\n\nconst nama = "NexaCode Local Engine";\nconsole.log(\`Selamat datang di editor \${nama}!\`);`,
                fibonacci: `// Fungsi rekursif untuk menghasilkan Deret Fibonacci\nfunction fibonacci(n) {\n    if (n <= 1) return n;\n    return fibonacci(n - 1) + fibonacci(n - 2);\n}\n\nconst hitungSampai = 10;\nconsole.log(\`Deret Fibonacci pertama sebanyak \${hitungSampai} suku:\`);\n\nlet hasil = [];\nfor (let i = 0; i < hitungSampai; i++) {\n    hasil.push(fibonacci(i));\n}\n\nconsole.log(hasil.join(" -> "));`,
                oop: `// Contoh Pemrograman Berorientasi Objek (OOP) di JavaScript\nclass Kendaraan {\n    constructor(merk, model) {\n        this.merk = merk;\n        this.model = model;\n    }\n\n    info() {\n        return \`Kendaraan ini bermerk \${this.merk} model \${this.model}.\`;\n    }\n}\n\nclass Mobil extends Kendaraan {\n    constructor(merk, model, pintu) {\n        super(merk, model);\n        this.pintu = pintu;\n    }\n\n    info() {\n        return \`\${super.info()} Mobil ini memiliki \${this.pintu} pintu.\`;\n    }\n}\n\nconst mobilSaya = new Mobil("Tesla", "Model S", 4);\nconsole.log(mobilSaya.info());`
            },
            php: {
                hello: `<?php\n// Program Hello World Sederhana di PHP\necho "Halo Dunia! Selamat belajar PHP.\\n";\n\n$nama = "NexaCode PHP Tunnel";\nprintf("Selamat datang di editor %s!\\n", $nama);`,
                fibonacci: `<?php\n// Fungsi rekursif untuk menghasilkan Deret Fibonacci\nfunction fibonacci($n) {\n    if ($n <= 1) {\n        return $n;\n    }\n    return fibonacci($n - 1) + fibonacci($n - 2);\n}\n\n$hitungSampai = 10;\necho "Deret Fibonacci pertama sebanyak $hitungSampai suku:\\n";\n\n$hasil = [];\nfor ($i = 0; $i < $hitungSampai; $i++) {\n    $hasil[] = fibonacci($i);\n}\n\necho implode(" -> ", $hasil) . "\\n";`,
                oop: `<?php\n// Contoh Pemrograman Berorientasi Objek (OOP) di PHP\nclass Kendaraan {\n    protected $merk;\n    protected $model;\n\n    public function __construct($merk, $model) {\n        $this->merk = $merk;\n        $this->model = $model;\n    }\n\n    public function info() {\n        return "Kendaraan ini bermerk {$this->merk} model {$this->model}.";\n    }\n}\n\nclass Mobil extends Kendaraan {\n    private $pintu;\n\n    public function __construct($merk, $model, $pintu) {\n        parent::__construct($merk, $model);\n        $this->pintu = $pintu;\n    }\n\n    public function info() {\n        return parent::info() . " Mobil ini memiliki {$this->pintu} pintu.";\n    }\n}\n\n$mobilSaya = new Mobil("Toyota", "GR Supra", 2);\necho $mobilSaya->info() . "\\n";`
            }
        };

        // Smart Fetch supporting proxy modes
        async function smartFetch(url, options = {}, useProxy = false) {
            let finalUrl = url;
            if (useProxy) {
                finalUrl = `https://corsproxy.io/?` + encodeURIComponent(url);
            }
            return await fetch(finalUrl, options);
        }

        // Initialize Monaco Editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            monaco.editor.defineTheme('nexaDark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '64748b', fontStyle: 'italic' },
                    { token: 'keyword', foreground: '818cf8', fontStyle: 'bold' },
                    { token: 'string', foreground: '34d399' },
                    { token: 'number', foreground: 'fbbf24' }
                ],
                colors: {
                    'editor.background': '#0f172a',
                    'editor.foreground': '#f1f5f9',
                    'editorLineNumber.foreground': '#475569',
                    'editorLineNumber.activeForeground': '#818cf8',
                    'editor.lineHighlightBackground': '#1e293b',
                    'editor.selectionBackground': '#334155',
                }
            });

            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            const codeParam = urlParams.get('code');

            if (langParam && (langParam === 'javascript' || langParam === 'php')) {
                currentLanguage = langParam;
            }

            let initialCode = templates[currentLanguage]['hello'];
            if (codeParam) {
                try {
                    initialCode = atob(decodeURIComponent(codeParam));
                } catch(e) {
                    console.error("Gagal mendekode kode dari URL.", e);
                }
            }

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: initialCode,
                language: currentLanguage,
                theme: 'nexaDark',
                fontSize: currentFontSize,
                fontFamily: 'Fira Code, JetBrains Mono, source-code-pro, Menlo, Monaco, Consolas, "Courier New", monospace',
                minimap: { enabled: false },
                automaticLayout: true,
                padding: { top: 16, bottom: 16 },
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: 'on',
                lineHeight: 22,
                tabSize: 4
            });

            updateLanguageUI();
        });

        // Toggle Language
        function setLanguage(lang) {
            if (lang === currentLanguage) return;
            
            currentLanguage = lang;
            updateLanguageUI();

            const code = templates[currentLanguage]['hello'];
            editor.setValue(code);
            document.getElementById('template-select').value = 'hello';

            showToast(`Bahasa diubah ke ${lang === 'javascript' ? 'JavaScript' : 'PHP'}`, 'fa-circle-check', 'text-emerald-400');
        }

        // Adjust UI
        function updateLanguageUI() {
            const btnJs = document.getElementById('btn-js');
            const btnPhp = document.getElementById('btn-php');
            const indicator = document.getElementById('editor-lang-indicator');
            const engineBranding = document.getElementById('engine-branding');

            if (currentLanguage === 'javascript') {
                btnJs.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-indigo-400 bg-slate-800 shadow-sm border border-slate-700/50";
                btnPhp.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-slate-400 hover:text-white";
                indicator.innerHTML = `<i class="fa-solid fa-bolt text-yellow-400 mr-1 animate-pulse"></i> Sandboxed Local VM (Offline)`;
                engineBranding.innerHTML = `Running locally inside Browser Sandbox`;
            } else {
                btnPhp.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-indigo-400 bg-slate-800 shadow-sm border border-slate-700/50";
                btnJs.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-slate-400 hover:text-white";
                indicator.innerHTML = `<i class="fa-solid fa-microchip text-emerald-400 mr-1 animate-pulse"></i> Hybrid PHP Engine (Auto-Bypass)`;
                engineBranding.innerHTML = `Smart Cloud Failover + Local PHP VM`;
            }

            if (editor) {
                const model = editor.getModel();
                monaco.editor.setModelLanguage(model, currentLanguage);
            }
        }

        // Load Templates
        function loadTemplate() {
            const select = document.getElementById('template-select');
            const val = select.value;
            if (templates[currentLanguage][val]) {
                editor.setValue(templates[currentLanguage][val]);
                showToast(`Memuat template ${val.toUpperCase()}`, 'fa-folder-open', 'text-indigo-400');
            }
        }

        // Adjust Font
        function adjustFontSize(dir) {
            currentFontSize += dir;
            if (currentFontSize < 10) currentFontSize = 10;
            if (currentFontSize > 24) currentFontSize = 24;
            
            document.getElementById('font-size-display').textContent = `${currentFontSize}px`;
            if (editor) {
                editor.updateOptions({ fontSize: currentFontSize });
            }
        }

        // Toggle STDIN
        function toggleInputArea() {
            const container = document.getElementById('input-container');
            const arrow = document.getElementById('input-arrow');
            const isHidden = container.classList.contains('hidden');

            if (isHidden) {
                container.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                container.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // Clean Terminal
        function clearTerminal() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = `<div class="text-slate-600 italic">// Terminal dibersihkan. Menunggu eksekusi kode baru...</div>`;
            showToast('Terminal dibersihkan', 'fa-trash-can', 'text-slate-400');
        }

        // Execution Controller
        async function runCode() {
            const runBtn = document.getElementById('btn-run');
            const terminal = document.getElementById('terminal');
            const statusIndicator = document.getElementById('status-indicator');
            const executionTime = document.getElementById('execution-time');
            const timeVal = document.getElementById('time-val');
            
            const code = editor.getValue().trim();
            if (!code) {
                showToast('Kode kosong! Silakan tulis kode terlebih dahulu.', 'fa-circle-xmark', 'text-red-400');
                return;
            }

            // Set loading state
            runBtn.disabled = true;
            runBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Memproses...`;
            statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> Mengompilasi...`;
            terminal.innerHTML = `<div class="text-slate-400 animate-pulse flex items-center gap-2"><i class="fa-solid fa-circle-notch animate-spin"></i> Menghubungkan ke terowongan compiler...</div>`;

            const startTime = performance.now();

            if (currentLanguage === 'javascript') {
                try {
                    const stdin = document.getElementById('stdin-input').value;
                    const result = await executeJSLocally(code, stdin);
                    
                    const endTime = performance.now();
                    const duration = Math.round(endTime - startTime);

                    renderTerminalOutput(result.output, result.error, result.code, duration);
                } catch (err) {
                    renderTerminalOutput("", err.message, 1, 0);
                }
            } else {
                // Execute PHP using Multi-Server Failover, with a local PHP emulator fallback!
                await executePHPWithFailover(code, startTime);
            }

            runBtn.disabled = false;
            runBtn.innerHTML = `<i class="fa-solid fa-play"></i> Jalankan Code`;
        }

        // 1. LOCAL JAVASCRIPT SANDBOXED VIRTUAL EXECUTION
        function executeJSLocally(code, stdin) {
            return new Promise((resolve) => {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.setAttribute('sandbox', 'allow-scripts');
                document.body.appendChild(iframe);

                const logs = [];
                const errors = [];

                const messageHandler = (event) => {
                    if (event.source !== iframe.contentWindow) return;
                    const data = event.data;
                    
                    if (data.type === 'log') {
                        logs.push(data.msg);
                    } else if (data.type === 'error') {
                        errors.push(data.msg);
                    } else if (data.type === 'done') {
                        window.removeEventListener('message', messageHandler);
                        document.body.removeChild(iframe);
                        resolve({
                            output: logs.join('\n'),
                            error: errors.join('\n'),
                            code: data.code
                        });
                    }
                };

                window.addEventListener('message', messageHandler);

                const stdinLines = stdin.split('\n');
                const iframeHtml = `
                    <!DOCTYPE html>
                    <html>
                    <head></head>
                    <body>
                        <script>
                            const stdinLines = ${JSON.stringify(stdinLines)};
                            let stdinIndex = 0;

                            window.readline = function() {
                                if (stdinIndex < stdinLines.length) {
                                    return stdinLines[stdinIndex++];
                                }
                                return null;
                            };

                            const customConsole = {
                                log: (...args) => {
                                    const msg = args.map(arg => {
                                        if (typeof arg === 'object') {
                                            try { return JSON.stringify(arg, null, 2); } catch(e) { return String(arg); }
                                        }
                                        return String(arg);
                                    }).join(' ');
                                    window.parent.postMessage({ type: 'log', msg }, '*');
                                },
                                error: (...args) => {
                                    const msg = args.map(arg => String(arg)).join(' ');
                                    window.parent.postMessage({ type: 'error', msg }, '*');
                                },
                                warn: (...args) => {
                                    const msg = args.map(arg => String(arg)).join(' ');
                                    window.parent.postMessage({ type: 'log', msg: '[WARN] ' + msg }, '*');
                                },
                                info: (...args) => {
                                    const msg = args.map(arg => String(arg)).join(' ');
                                    window.parent.postMessage({ type: 'log', msg }, '*');
                                }
                            };

                            window.console = customConsole;

                            // Custom Mock printf implementation
                            window.printf = function(format, ...args) {
                                let i = 0;
                                let result = format.replace(/%s|%d|%f/g, (match) => {
                                    return args[i++];
                                });
                                customConsole.log(result);
                            };

                            window.onerror = function(message, source, lineno, colno, error) {
                                window.parent.postMessage({ type: 'error', msg: 'Line ' + (lineno - 44) + ': ' + message }, '*');
                                window.parent.postMessage({ type: 'done', code: 1 }, '*');
                                return true;
                            };

                            try {
                                const runScript = new Function('console', 'readline', 'printf', \`
                                    try {
                                        \${${JSON.stringify(code)}}
                                    } catch(e) {
                                        console.error(e.stack || e.message || e);
                                        throw e;
                                    }
                                \`);
                                runScript(customConsole, window.readline, window.printf);
                                window.parent.postMessage({ type: 'done', code: 0 }, '*');
                            } catch (err) {
                                window.parent.postMessage({ type: 'done', code: 1 }, '*');
                            }
                        <\/script>
                    </body>
                    </html>
                `;

                iframe.srcdoc = iframeHtml;
            });
        }

        // PHP TO JAVASCRIPT TRANSPILER VM (100% OFFLINE / BYPASS CAPABILITY)
        function transpilePHPtoJS(php) {
            let js = php;
            // 1. Bersihkan tag pembuka dan penutup PHP
            js = js.replace(/<\?php/g, '').replace(/\?>/g, '');

            // 2. Transpilasi class constructor
            js = js.replace(/\bpublic\s+function\s+__construct/g, 'constructor');
            js = js.replace(/\bfunction\s+__construct/g, 'constructor');

            // 3. Transpilasi pewarisan konstruktor (super)
            js = js.replace(/parent::__construct\(([^)]*)\)/g, 'super($1)');

            // 4. Bersihkan kata kunci properti PHP (protected, private, public)
            js = js.replace(/\b(protected|private|public)\s+\$[a-zA-Z0-9_]+\s*;/g, '');

            // 5. Bersihkan metode class (ubah 'public function nama()' menjadi 'nama()')
            js = js.replace(/\b(public|protected|private)\s+function\s+([a-zA-Z0-9_]+)/g, '$2');

            // 6. Konversi operator '->' menjadi '.'
            js = js.replace(/->/g, '.');

            // 7. Konversi '$this' menjadi 'this'
            js = js.replace(/\$this\b/g, 'this');

            // 8. Konversi shorthand push array: '$var[] = val' menjadi '$var.push(val)'
            js = js.replace(/(\$[a-zA-Z0-9_]+)\[\]\s*=\s*([^;]+)/g, '$1.push($2)');

            // 9. Konversi fungsi 'array(...)' lama menjadi '[...]'
            js = js.replace(/\barray\(([^)]*)\)/g, '[$1]');

            // 10. Konversi 'implode(glue, array)' menjadi 'array.join(glue)'
            js = js.replace(/\bimplode\(([^,]+),\s*([^)]+)\)/g, '($2).join($1)');

            // 11. Konversi operator penggabung string PHP '.' menjadi '+'
            js = js.replace(/(\s+)\.(\s+)/g, ' + ');

            // 12. Interpolasi variabel string dengan tanda petik dua PHP ("Halo $nama" -> `Halo ${$nama}`)
            js = js.replace(/"([^"\\]*(?:\\.[^"\\]*)*)"/g, (match, content) => {
                if (content.includes('$')) {
                    let interpolated = content.replace(/\$([a-zA-Z0-9_]+)/g, '${$$$1}');
                    return '`' + interpolated + '`';
                }
                return match;
            });

            // 13. Ubah 'echo' dan 'print' menjadi 'console.log'
            js = js.replace(/\becho\s+([^;]+);/g, (match, expr) => {
                let converted = expr.replace(/(\s+)\.(\s+)/g, ' + ');
                return `console.log(${converted});`;
            });
            js = js.replace(/\bprint\s+([^;]+);/g, (match, expr) => {
                let converted = expr.replace(/(\s+)\.(\s+)/g, ' + ');
                return `console.log(${converted});`;
            });

            return js;
        }

        // 2. MULTI-SERVER FAILOVER PIPELINE FOR PHP WITH TUNNEL PROXIES & LOCAL VM FAILBACK
        async function executePHPWithFailover(code, startTime) {
            const terminal = document.getElementById('terminal');
            const stdin = document.getElementById('stdin-input').value;

            // List of cloud compiler routes
            const executionPipeline = [
                // Route 1: Piston API with Tunnel Proxy
                {
                    name: "Piston Compiler (Tunnel Proxy)",
                    useProxy: true,
                    url: "https://emkc.org/api/v2/piston/execute",
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    getBody: () => JSON.stringify({
                        language: 'php',
                        version: phpRuntimeVersion,
                        files: [{ name: 'index.php', content: code }],
                        stdin: stdin
                    }),
                    parseResponse: async (res) => {
                        const result = await res.json();
                        return {
                            output: result.run.output,
                            error: result.run.stderr,
                            code: result.run.code
                        };
                    }
                },
                // Route 2: Rextester API via Tunnel Proxy
                {
                    name: "Rextester Compiler (Tunnel Proxy)",
                    useProxy: true,
                    url: "https://rextester.com/rundotnet/api",
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    getBody: () => new URLSearchParams({
                        'LanguageChoice': '8', // PHP
                        'Program': code,
                        'Input': stdin,
                        'CompilerArgs': ''
                    }),
                    parseResponse: async (res) => {
                        const data = await res.json();
                        return {
                            output: data.Result,
                            error: data.Errors || data.Warnings,
                            code: (data.Errors && !data.Result) ? 1 : 0
                        };
                    }
                }
            ];

            // Loop through routes
            for (let i = 0; i < executionPipeline.length; i++) {
                const route = executionPipeline[i];
                terminal.innerHTML = `<div class="text-slate-400 animate-pulse flex items-center gap-2">
                    <i class="fa-solid fa-route animate-pulse"></i> 
                    Mencoba cloud server: <strong class="text-indigo-400">${route.name}</strong>... [Jalur ${i+1}/${executionPipeline.length}]
                </div>`;

                try {
                    const response = await smartFetch(route.url, {
                        method: route.method,
                        headers: route.headers,
                        body: route.getBody()
                    }, route.useProxy);

                    if (response.ok) {
                        const result = await route.parseResponse(response);
                        const duration = Math.round(performance.now() - startTime);
                        renderTerminalOutput(result.output, result.error, result.code, duration, route.name);
                        return; // Selesai jika cloud sukses
                    }
                } catch (err) {
                    console.warn(`Jalur ${route.name} gagal berkomunikasi. Mencari alternatif...`);
                }
            }

            // --- LOCAL EMULATOR VM FALLBACK (TRIGGERED WHEN ALL CLOUD PATHS ARE BLOCKED!) ---
            terminal.innerHTML = `<div class="text-amber-400 animate-pulse flex items-center gap-2">
                <i class="fa-solid fa-triangle-exclamation"></i> 
                Cloud terblokir CORS/Offline. Mengaktifkan <strong>Local PHP VM Emulator (0ms)</strong>...
            </div>`;

            try {
                // Transpile PHP code to safe Javascript
                const transpiledJS = transpilePHPtoJS(code);
                
                // Execute PHP code locally as Javascript
                const result = await executeJSLocally(transpiledJS, stdin);
                const duration = Math.round(performance.now() - startTime);

                // Print outputs along with local environment indicator
                renderTerminalOutput(
                    result.output, 
                    result.error, 
                    result.code, 
                    duration, 
                    "Local PHP VM Emulator", 
                    true // local flag
                );
            } catch (fallbackError) {
                const duration = Math.round(performance.now() - startTime);
                renderTerminalOutput(
                    "",
                    "Gagal memproses kode secara lokal: " + fallbackError.message,
                    1,
                    duration,
                    "Local Failover Error"
                );
            }
        }

        // RENDER OUTPUT TO TERMINAL
        function renderTerminalOutput(output, error, codeExit, duration, engineName = "Local VM", isLocalFallback = false) {
            const terminal = document.getElementById('terminal');
            const statusIndicator = document.getElementById('status-indicator');
            const executionTime = document.getElementById('execution-time');
            const timeVal = document.getElementById('time-val');

            terminal.innerHTML = "";

            // If it used the local emulator fallback, display an informational banner
            if (isLocalFallback) {
                terminal.innerHTML += `
                    <div class="bg-amber-950/40 border border-amber-900/50 text-amber-300 p-3 rounded-lg mb-4 text-xs flex items-start gap-2.5 leading-relaxed">
                        <i class="fa-solid fa-circle-info text-amber-400 mt-0.5"></i>
                        <div>
                            <strong>Bypass Sukses:</strong> Koneksi cloud dibatasi oleh browser Anda. NexaCode berhasil mengaktifkan <strong>Local PHP VM Emulator</strong> untuk memproses script Anda secara langsung.
                        </div>
                    </div>
                `;
            }

            if (output) {
                const formattedOutput = escapeHtml(output).replace(/\n/g, '<br>');
                terminal.innerHTML += `<div class="text-emerald-400 mb-2 font-bold tracking-wider">--- OUTPUT PROGRAM (${engineName.toUpperCase()}) ---</div>`;
                terminal.innerHTML += `<div class="text-slate-100 font-mono select-text mb-4 leading-relaxed">${formattedOutput}</div>`;
            }

            if (error) {
                const formattedError = escapeHtml(error).replace(/\n/g, '<br>');
                terminal.innerHTML += `<div class="text-rose-400 mb-2 font-bold tracking-wider">--- RUNTIME ERROR / WARNING ---</div>`;
                terminal.innerHTML += `<div class="text-rose-300 bg-rose-950/30 p-3 rounded border border-rose-900/40 font-mono mb-4 text-xs select-text">${formattedError}</div>`;
            }

            if (!output && !error) {
                terminal.innerHTML = `<div class="text-slate-500 italic">// Program berhasil dieksekusi tetapi tidak menghasilkan output apa pun.</div>`;
            }

            // Update Status
            if (codeExit === 0) {
                statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Sukses`;
                showToast('Eksekusi Berhasil!', 'fa-circle-check', 'text-emerald-400');
            } else {
                statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-rose-500"></span> Gagal`;
                showToast('Eksekusi Selesai dengan Error', 'fa-triangle-exclamation', 'text-rose-400');
            }

            executionTime.classList.remove('hidden');
            timeVal.textContent = `${duration}ms`;
        }

        // HELPERS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        function showToast(message, icon, colorClass = 'text-indigo-400') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastMsg.textContent = message;
            toastIcon.className = `fa-solid ${icon} ${colorClass}`;

            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }, 3000);
        }

        function shareCode() {
            const code = editor.getValue();
            const encodedCode = encodeURIComponent(btoa(code));
            const shareUrl = `${window.location.origin}${window.location.pathname}?lang=${currentLanguage}&code=${encodedCode}`;

            try {
                const el = document.createElement('textarea');
                el.value = shareUrl;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast('Link berhasil disalin ke clipboard!', 'fa-link', 'text-emerald-400');
            } catch(err) {
                showToast('Gagal menyalin link secara otomatis.', 'fa-triangle-exclamation', 'text-yellow-400');
            }
        }
    </script>
