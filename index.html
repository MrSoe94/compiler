<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Web Compiler (JS & PHP)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs/loader.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            editor: '#1e293b',
                            accent: '#6366f1',
                            accentHover: '#4f46e5'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar untuk terminal dan editor */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b;
        }
        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 h-full flex flex-col font-sans overflow-hidden">

    <!-- Top Navigation Bar -->
    <header class="bg-slate-950 border-b border-slate-800 px-6 py-3 flex flex-wrap justify-between items-center gap-4 z-10 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-code text-xl"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-white flex items-center gap-2">
                    NexaCode <span class="text-xs bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded font-mono">v1.3</span>
                </h1>
                <p class="text-xs text-slate-400 font-medium">Kompilasi JavaScript & PHP Instan</p>
            </div>
        </div>

        <!-- Controls Group -->
        <div class="flex items-center flex-wrap gap-3">
            <!-- Language Selector -->
            <div class="flex bg-slate-900 rounded-lg p-1 border border-slate-800">
                <button id="btn-js" onclick="setLanguage('javascript')" class="px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-indigo-400 bg-slate-800 shadow-sm">
                    <i class="fa-brands fa-js text-yellow-400"></i> JavaScript
                </button>
                <button id="btn-php" onclick="setLanguage('php')" class="px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-slate-400 hover:text-white">
                    <i class="fa-brands fa-php text-blue-400"></i> PHP
                </button>
            </div>

            <!-- Templates Dropdown -->
            <div class="relative">
                <select id="template-select" onchange="loadTemplate()" class="bg-slate-900 text-slate-300 border border-slate-800 rounded-lg px-3 py-1.5 text-sm outline-none focus:border-indigo-500 cursor-pointer">
                    <option value="hello">Template: Hello World</option>
                    <option value="fibonacci">Template: Fibonacci</option>
                    <option value="oop">Template: Pemrograman Berorientasi Objek (OOP)</option>
                </select>
            </div>

            <!-- Font Size -->
            <div class="flex items-center bg-slate-900 border border-slate-800 rounded-lg px-2 py-1">
                <button onclick="adjustFontSize(-1)" class="text-slate-400 hover:text-white px-2 py-0.5" title="Perkecil Font"><i class="fa-solid fa-minus text-xs"></i></button>
                <span id="font-size-display" class="text-xs font-mono px-1">14px</span>
                <button onclick="adjustFontSize(1)" class="text-slate-400 hover:text-white px-2 py-0.5" title="Perbesar Font"><i class="fa-solid fa-plus text-xs"></i></button>
            </div>

            <!-- Run Button -->
            <button id="btn-run" onclick="runCode()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-5 py-1.5 rounded-lg flex items-center gap-2 transition-all shadow-lg shadow-emerald-500/20 active:scale-95">
                <i class="fa-solid fa-play"></i> Jalankan Code
            </button>

            <!-- Share Button -->
            <button onclick="shareCode()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-sm flex items-center gap-2 transition-all border border-slate-700" title="Salin link kode">
                <i class="fa-solid fa-share-nodes"></i> Share
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- Left Pane: Code Editor -->
        <div class="w-full md:w-1/2 flex flex-col border-b md:border-b-0 md:border-r border-slate-800 h-1/2 md:h-full relative">
            <div class="bg-slate-950 px-4 py-2 flex justify-between items-center border-b border-slate-800 shrink-0">
                <span class="text-xs font-semibold text-slate-400 tracking-wider uppercase flex items-center gap-2">
                    <i class="fa-solid fa-terminal text-indigo-400"></i> Editor Sumber
                </span>
                <span id="editor-lang-indicator" class="text-xs bg-slate-900 px-2 py-1 rounded text-slate-300 font-mono border border-slate-800">
                    Mendeteksi versi...
                </span>
            </div>
            <!-- Editor Container -->
            <div id="editor-container" class="flex-1 w-full h-full bg-slate-950"></div>
        </div>

        <!-- Right Pane: Terminal & Input -->
        <div class="w-full md:w-1/2 flex flex-col h-1/2 md:h-full bg-slate-950">
            <!-- STDIN / Input Area -->
            <div class="border-b border-slate-800">
                <button onclick="toggleInputArea()" class="w-full px-4 py-2 bg-slate-900 hover:bg-slate-855 text-left text-xs font-semibold text-slate-400 flex justify-between items-center transition-all">
                    <span class="flex items-center gap-2">
                        <i class="fa-solid fa-keyboard text-emerald-400"></i> Input Program (STDIN / Argumen)
                    </span>
                    <i id="input-arrow" class="fa-solid fa-chevron-down transition-transform duration-300"></i>
                </button>
                <div id="input-container" class="hidden p-4 bg-slate-900 border-t border-slate-800">
                    <textarea id="stdin-input" class="w-full h-24 bg-slate-950 text-slate-200 font-mono text-sm p-3 rounded border border-slate-800 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none placeholder-slate-600 resize-none" placeholder="Masukkan input baris per baris di sini jika program Anda membaca input (misalnya menggunakan readline() di JS atau fgets(STDIN) di PHP)..."></textarea>
                </div>
            </div>

            <!-- Terminal Output Area -->
            <div class="flex-1 flex flex-col overflow-hidden">
                <div class="bg-slate-900 px-4 py-2 flex justify-between items-center border-b border-slate-800 shrink-0">
                    <span class="text-xs font-semibold text-slate-400 tracking-wider uppercase flex items-center gap-2">
                        <i class="fa-solid fa-rectangle-terminal text-emerald-400"></i> Terminal Output
                    </span>
                    <div class="flex gap-2">
                        <button onclick="clearTerminal()" class="text-slate-400 hover:text-white text-xs bg-slate-800 hover:bg-slate-700 px-2.5 py-1 rounded border border-slate-700 transition-all flex items-center gap-1.5">
                            <i class="fa-solid fa-trash-can"></i> Bersihkan
                        </button>
                    </div>
                </div>
                <!-- Terminal Console -->
                <div id="terminal" class="flex-1 p-4 font-mono text-sm overflow-y-auto bg-slate-950 leading-relaxed select-text">
                    <div class="text-slate-500 italic mb-2">// Menunggu eksekusi kode...</div>
                    <div class="text-indigo-400">Silakan klik "Jalankan Code" di atas untuk memproses script Anda.</div>
                </div>
            </div>

            <!-- Bottom Status Bar -->
            <footer class="bg-slate-950 border-t border-slate-800 px-4 py-2.5 flex justify-between items-center text-xs text-slate-500 shrink-0">
                <div class="flex items-center gap-4">
                    <span id="status-indicator" class="flex items-center gap-1.5 text-slate-400">
                        <span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> Menginisialisasi compiler...
                    </span>
                    <span id="execution-time" class="hidden text-slate-400">
                        <i class="fa-regular fa-clock"></i> <span id="time-val">0ms</span>
                    </span>
                </div>
                <div>
                    Didukung oleh <a href="https://github.com/engineer-man/piston" target="_blank" class="text-indigo-400 hover:underline">Piston API</a>
                </div>
            </footer>
        </div>
    </main>

    <!-- Modal Notification Toast -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 border border-indigo-500/50 text-white px-5 py-3 rounded-xl shadow-2xl shadow-indigo-500/10 flex items-center gap-3 transition-all duration-300 opacity-0 pointer-events-none translate-y-4 z-50">
        <i id="toast-icon" class="fa-solid fa-circle-info text-indigo-400"></i>
        <span id="toast-message" class="text-sm font-medium">Informasi</span>
    </div>

    <script>
        // Global variables
        let editor;
        let currentLanguage = 'javascript';
        let currentFontSize = 14;

        // Fallback default versions if API check fails
        let runtimes = {
            javascript: { language: 'javascript', version: '18.15.0' },
            php: { language: 'php', version: '8.2.3' }
        };

        // Code Templates (Fixed PHP OOP syntax)
        const templates = {
            javascript: {
                hello: `// Program Hello World Sederhana di JavaScript (Node.js)\nconsole.log("Halo Dunia! Selamat belajar JavaScript.");\n\nconst nama = "NexaCode";\nconsole.log(\`Selamat datang di editor \${nama}!\`);`,
                fibonacci: `// Fungsi rekursif untuk menghasilkan Deret Fibonacci\nfunction fibonacci(n) {\n    if (n <= 1) return n;\n    return fibonacci(n - 1) + fibonacci(n - 2);\n}\n\nconst hitungSampai = 10;\nconsole.log(\`Deret Fibonacci pertama sebanyak \${hitungSampai} suku:\`);\n\nlet hasil = [];\nfor (let i = 0; i < hitungSampai; i++) {\n    hasil.push(fibonacci(i));\n}\n\nconsole.log(hasil.join(" -> "));`,
                oop: `// Contoh Pemrograman Berorientasi Objek (OOP) di JavaScript\nclass Kendaraan {\n    constructor(merk, model) {\n        this.merk = merk;\n        this.model = model;\n    }\n\n    info() {\n        return \`Kendaraan ini bermerk \${this.merk} model \${this.model}.\`;\n    }\n}\n\nclass Mobil extends Kendaraan {\n    constructor(merk, model, pintu) {\n        super(merk, model);\n        this.pintu = pintu;\n    }\n\n    info() {\n        return \`\${super.info()} Mobil ini memiliki \${this.pintu} pintu.\`;\n    }\n}\n\nconst mobilSaya = new Mobil("Tesla", "Model S", 4);\nconsole.log(mobilSaya.info());`
            },
            php: {
                hello: `<?php\n// Program Hello World Sederhana di PHP\necho "Halo Dunia! Selamat belajar PHP.\\n";\n\n$nama = "NexaCode";\nprintf("Selamat datang di editor %s!\\n", $nama);`,
                fibonacci: `<?php\n// Fungsi rekursif untuk menghasilkan Deret Fibonacci\nfunction fibonacci($n) {\n    if ($n <= 1) {\n        return $n;\n    }\n    return fibonacci($n - 1) + fibonacci($n - 2);\n}\n\n$hitungSampai = 10;\necho "Deret Fibonacci pertama sebanyak $hitungSampai suku:\\n";\n\n$hasil = [];\nfor ($i = 0; $i < $hitungSampai; $i++) {\n    $hasil[] = fibonacci($i);\n}\n\necho implode(" -> ", $hasil) . "\\n";`,
                oop: `<?php\n// Contoh Pemrograman Berorientasi Objek (OOP) di PHP\nclass Kendaraan {\n    protected $merk;\n    protected $model;\n\n    public function __construct($merk, $model) {\n        $this->merk = $merk;\n        $this->model = $model;\n    }\n\n    public function info() {\n        return "Kendaraan ini bermerk {$this->merk} model {$this->model}.";\n    }\n}\n\nclass Mobil extends Kendaraan {\n    private $pintu;\n\n    public function __construct($merk, $model, $pintu) {\n        parent::__construct($merk, $model);\n        $this->pintu = $pintu;\n    }\n\n    public function info() {\n        return parent::info() . " Mobil ini memiliki {$this->pintu} pintu.";\n    }\n}\n\n$mobilSaya = new Mobil("Toyota", "GR Supra", 2);\necho $mobilSaya->info() . "\\n";`
            }
        };

        // Fetch installed runtimes dynamically to prevent 400 Bad Request
        async function loadActiveRuntimes() {
            try {
                const response = await fetch('https://emkc.org/api/v2/piston/runtimes');
                if (response.ok) {
                    const data = await response.json();
                    
                    // Match newest JavaScript runtime
                    const jsRuntime = data.find(r => r.language === 'javascript' || r.aliases.includes('js') || r.aliases.includes('javascript'));
                    if (jsRuntime) {
                        runtimes.javascript.language = jsRuntime.language;
                        runtimes.javascript.version = jsRuntime.version;
                    }

                    // Match newest PHP runtime
                    const phpRuntime = data.find(r => r.language === 'php' || r.aliases.includes('php'));
                    if (phpRuntime) {
                        runtimes.php.language = phpRuntime.language;
                        runtimes.php.version = phpRuntime.version;
                    }
                    console.log("Runtimes yang berhasil diaktifkan:", runtimes);
                }
            } catch (error) {
                console.error("Gagal mendeteksi runtime dinamis, menggunakan konfigurasi cadangan.", error);
            } finally {
                updateLanguageUI();
                const statusIndicator = document.getElementById('status-indicator');
                statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Siap`;
            }
        }

        // Initialize Monaco Editor
        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.39.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            // Register & define theme
            monaco.editor.defineTheme('nexaDark', {
                base: 'vs-dark',
                inherit: true,
                rules: [
                    { token: 'comment', foreground: '64748b', fontStyle: 'italic' },
                    { token: 'keyword', foreground: '818cf8', fontStyle: 'bold' },
                    { token: 'string', foreground: '34d399' },
                    { token: 'number', foreground: 'fbbf24' }
                ],
                colors: {
                    'editor.background': '#0f172a',
                    'editor.foreground': '#f1f5f9',
                    'editorLineNumber.foreground': '#475569',
                    'editorLineNumber.activeForeground': '#818cf8',
                    'editor.lineHighlightBackground': '#1e293b',
                    'editor.selectionBackground': '#334155',
                }
            });

            // Check if there is code in URL
            const urlParams = new URLSearchParams(window.location.search);
            const langParam = urlParams.get('lang');
            const codeParam = urlParams.get('code');

            if (langParam && (langParam === 'javascript' || langParam === 'php')) {
                currentLanguage = langParam;
            }

            let initialCode = templates[currentLanguage]['hello'];
            if (codeParam) {
                try {
                    initialCode = atob(decodeURIComponent(codeParam));
                } catch(e) {
                    console.error("Gagal mendekode kode dari URL.", e);
                }
            }

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: initialCode,
                language: currentLanguage,
                theme: 'nexaDark',
                fontSize: currentFontSize,
                fontFamily: 'Fira Code, JetBrains Mono, source-code-pro, Menlo, Monaco, Consolas, "Courier New", monospace',
                minimap: { enabled: false },
                automaticLayout: true,
                padding: { top: 16, bottom: 16 },
                cursorBlinking: 'smooth',
                cursorSmoothCaretAnimation: 'on',
                lineHeight: 22,
                tabSize: 4
            });

            // Load active runtime versions dynamically
            loadActiveRuntimes();
        });

        // Set Language (JavaScript or PHP)
        function setLanguage(lang) {
            if (lang === currentLanguage) return;
            
            currentLanguage = lang;
            updateLanguageUI();

            // Load default hello template
            const code = templates[currentLanguage]['hello'];
            editor.setValue(code);
            document.getElementById('template-select').value = 'hello';

            showToast(`Bahasa diubah ke ${lang === 'javascript' ? 'JavaScript' : 'PHP'}`, 'fa-circle-check', 'text-emerald-400');
        }

        // Update active class on buttons
        function updateLanguageUI() {
            const btnJs = document.getElementById('btn-js');
            const btnPhp = document.getElementById('btn-php');
            const indicator = document.getElementById('editor-lang-indicator');

            const currentRuntimeInfo = runtimes[currentLanguage];

            if (currentLanguage === 'javascript') {
                btnJs.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-indigo-400 bg-slate-800 shadow-sm border border-slate-700/50";
                btnPhp.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-slate-400 hover:text-white";
                indicator.textContent = `node.js (${currentRuntimeInfo.version})`;
            } else {
                btnPhp.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-indigo-400 bg-slate-800 shadow-sm border border-slate-700/50";
                btnJs.className = "px-4 py-1.5 rounded-md text-sm font-semibold transition-all flex items-center gap-2 text-slate-400 hover:text-white";
                indicator.textContent = `php (${currentRuntimeInfo.version})`;
            }

            if (editor) {
                const model = editor.getModel();
                monaco.editor.setModelLanguage(model, currentLanguage);
            }
        }

        // Load predefined templates
        function loadTemplate() {
            const select = document.getElementById('template-select');
            const val = select.value;
            if (templates[currentLanguage][val]) {
                editor.setValue(templates[currentLanguage][val]);
                showToast(`Memuat template ${val.toUpperCase()}`, 'fa-folder-open', 'text-indigo-400');
            }
        }

        // Font Size Adjustments
        function adjustFontSize(dir) {
            currentFontSize += dir;
            if (currentFontSize < 10) currentFontSize = 10;
            if (currentFontSize > 24) currentFontSize = 24;
            
            document.getElementById('font-size-display').textContent = `${currentFontSize}px`;
            if (editor) {
                editor.updateOptions({ fontSize: currentFontSize });
            }
        }

        // Toggle Input STDIN Panel
        function toggleInputArea() {
            const container = document.getElementById('input-container');
            const arrow = document.getElementById('input-arrow');
            const isHidden = container.classList.contains('hidden');

            if (isHidden) {
                container.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                container.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        // Clear terminal output
        function clearTerminal() {
            const terminal = document.getElementById('terminal');
            terminal.innerHTML = `<div class="text-slate-600 italic">// Terminal dibersihkan. Menunggu eksekusi kode baru...</div>`;
            showToast('Terminal dibersihkan', 'fa-trash-can', 'text-slate-400');
        }

        // API compilation and execution using Piston Engine with dynamic versioning
        async function runCode() {
            const runBtn = document.getElementById('btn-run');
            const terminal = document.getElementById('terminal');
            const statusIndicator = document.getElementById('status-indicator');
            const executionTime = document.getElementById('execution-time');
            const timeVal = document.getElementById('time-val');
            
            // Code Content
            const code = editor.getValue().trim();
            if (!code) {
                showToast('Kode kosong! Silakan tulis kode terlebih dahulu.', 'fa-circle-xmark', 'text-red-400');
                return;
            }

            // Set Loading UI
            runBtn.disabled = true;
            runBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Memproses...`;
            statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-yellow-500 animate-pulse"></span> Mengompilasi...`;
            terminal.innerHTML = `<div class="text-slate-400 animate-pulse flex items-center gap-2"><i class="fa-solid fa-gear animate-spin"></i> Menghubungkan ke compiler server...</div>`;

            // Setup dynamic payload using detected versions
            const selectedLang = runtimes[currentLanguage];
            const stdin = document.getElementById('stdin-input').value;

            const payload = {
                language: selectedLang.language,
                version: selectedLang.version,
                files: [
                    {
                        name: currentLanguage === 'javascript' ? 'index.js' : 'index.php',
                        content: code
                    }
                ],
                stdin: stdin
            };

            const startTime = performance.now();

            // Execution with Exponential Backoff
            let attempt = 0;
            const maxRetries = 5;
            let response = null;
            let success = false;
            let errorMsg = "";

            while (attempt < maxRetries && !success) {
                try {
                    response = await fetch('https://emkc.org/api/v2/piston/execute', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    
                    if (response.ok) {
                        success = true;
                    } else {
                        // Capture API dynamic error message (e.g. version unsupported)
                        const errData = await response.json().catch(() => ({}));
                        errorMsg = errData.message || `Server bermasalah (Status: ${response.status})`;
                        throw new Error(errorMsg);
                    }
                } catch (err) {
                    attempt++;
                    errorMsg = err.message;
                    const delay = Math.pow(2, attempt) * 1000; // Exponential Backoff: 2s, 4s, 8s...
                    
                    if (attempt < maxRetries) {
                        terminal.innerHTML = `<div class="text-yellow-500"><i class="fa-solid fa-triangle-exclamation"></i> Gagal terhubung ke compiler, mencoba kembali dalam ${delay / 1000} detik (Percobaan ke-${attempt}/${maxRetries})...</div>`;
                        await new Promise(resolve => setTimeout(resolve, delay));
                    } else {
                        terminal.innerHTML = `
                            <div class="text-red-500 font-bold mb-2">Error Koneksi Server Compiler!</div>
                            <div class="text-slate-400 text-xs mb-2">Gagal memproses kode pada compiler server. Pastikan koneksi internet Anda stabil.</div>
                            <div class="text-red-300 bg-red-950/40 p-3 rounded border border-red-900/50 font-mono text-xs">Detail: ${errorMsg}</div>
                        `;
                    }
                }
            }

            const endTime = performance.now();
            const localDuration = Math.round(endTime - startTime);

            // Re-enable Run Button
            runBtn.disabled = false;
            runBtn.innerHTML = `<i class="fa-solid fa-play"></i> Jalankan Code`;

            if (success && response) {
                const result = await response.json();
                
                // Read compilation or runtime logs
                const output = result.run.output || "";
                const error = result.run.stderr || "";
                const codeExit = result.run.code;

                terminal.innerHTML = "";

                if (output) {
                    const formattedOutput = escapeHtml(output).replace(/\n/g, '<br>');
                    terminal.innerHTML += `<div class="text-emerald-400 mb-2 font-semibold">--- OUTPUT PROGRAM ---</div>`;
                    terminal.innerHTML += `<div class="text-slate-100 font-mono select-text mb-4">${formattedOutput}</div>`;
                }

                if (error) {
                    const formattedError = escapeHtml(error).replace(/\n/g, '<br>');
                    terminal.innerHTML += `<div class="text-red-400 mb-2 font-semibold">--- ERROR DETEKSI ---</div>`;
                    terminal.innerHTML += `<div class="text-red-300 bg-red-950/40 p-3 rounded border border-red-900/50 font-mono mb-4 text-xs select-text">${formattedError}</div>`;
                }

                if (!output && !error) {
                    terminal.innerHTML = `<div class="text-slate-400 italic">// Program selesai dieksekusi tanpa mengembalikan output.</div>`;
                }

                // Update Status Bar
                if (codeExit === 0) {
                    statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500"></span> Sukses`;
                    showToast('Kode berhasil dieksekusi!', 'fa-circle-check', 'text-emerald-400');
                } else {
                    statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> Error (Exit Code: ${codeExit})`;
                    showToast('Eksekusi selesai dengan kesalahan.', 'fa-circle-xmark', 'text-red-400');
                }

                // Show Execution Speed info
                executionTime.classList.remove('hidden');
                timeVal.textContent = `${localDuration}ms`;

            } else {
                statusIndicator.innerHTML = `<span class="w-2 h-2 rounded-full bg-red-500"></span> Gagal Memproses`;
                executionTime.classList.add('hidden');
            }
        }

        // Helpers
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, function(m) { return map[m]; });
        }

        // Toast Notifications
        function showToast(message, icon, colorClass = 'text-indigo-400') {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-message');
            const toastIcon = document.getElementById('toast-icon');

            toastMsg.textContent = message;
            toastIcon.className = `fa-solid ${icon} ${colorClass}`;

            toast.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
            }, 3000);
        }

        // Code Sharing Feature: Generate base64 link parameters
        function shareCode() {
            const code = editor.getValue();
            const encodedCode = encodeURIComponent(btoa(code));
            const shareUrl = `${window.location.origin}${window.location.pathname}?lang=${currentLanguage}&code=${encodedCode}`;

            try {
                const el = document.createElement('textarea');
                el.value = shareUrl;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast('Link berhasil disalin ke clipboard!', 'fa-link', 'text-emerald-400');
            } catch(err) {
                showToast('Gagal menyalin link secara otomatis.', 'fa-triangle-exclamation', 'text-yellow-400');
            }
        }
    </script>
</body>
</html>
